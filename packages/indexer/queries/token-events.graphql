# Busca eventos de um token específico (mints, burns, transfers, forced_transfers)
query TokenEvents($id: String!, $first: Int = 50) {
  token(id: $id) {
    id
    totalSupply
    events(first: $first) {
      txHash
      block
      logIndex
      from
      to
      amount
      eventType
    }
  }
}

# Variáveis:
# { "id": "1", "first": 100 }
