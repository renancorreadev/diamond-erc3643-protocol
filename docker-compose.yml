services:
  # ── Indexer (Go + RocksDB) ──
  indexer:
    build:
      context: ./packages/indexer
      dockerfile: Dockerfile
    container_name: diamond-indexer
    restart: unless-stopped
    ports:
      - "${INDEXER_PORT:-8080}:8080"
    environment:
      - DIAMOND_ADDRESS=${DIAMOND_ADDRESS}
      - RPC_URL=${RPC_URL}
      - RPC_WS_URL=${RPC_WS_URL}
      - START_BLOCK=${START_BLOCK:-35116199}
      - HTTP_LISTEN=:8080
      - DATA_DIR=/app/data
    volumes:
      - indexer-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 3s
      start_period: 10s
      retries: 3

  # ── Frontend (React SPA via nginx) ──
  app:
    build:
      context: .
      dockerfile: packages/app/Dockerfile
      args:
        VITE_DIAMOND_ADDRESS: ${DIAMOND_ADDRESS}
        VITE_INDEXER_URL: ${VITE_INDEXER_URL:-http://localhost:8080}
        VITE_RPC_URL: ${RPC_URL}
        VITE_COUNTRY_RESTRICT_MODULE: ${VITE_COUNTRY_RESTRICT_MODULE}
        VITE_MAX_BALANCE_MODULE: ${VITE_MAX_BALANCE_MODULE}
        VITE_MAX_HOLDERS_MODULE: ${VITE_MAX_HOLDERS_MODULE}
    container_name: diamond-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:80"
    depends_on:
      indexer:
        condition: service_healthy

  # ── Forge Visual (Test Dashboard + Foundry) ──
  forge-visual:
    build:
      context: .
      dockerfile: packages/tools/forge-visual/Dockerfile
    container_name: diamond-forge-visual
    restart: unless-stopped
    ports:
      - "${FORGE_VISUAL_PORT:-3999}:3999"
    environment:
      - FORGE_PROJECT=/project
      - PORT=3999
      - NODE_ENV=production
    volumes:
      - forge-reports:/app/reports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3999/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

volumes:
  indexer-data:
  forge-reports:
